openapi: 3.1.0
info:
  title: 多接收者文件中心与本地解密接口
  version: 1.0.0
  description: |
    定义 RSA+AES 多接收者加密任务、文件中心、详情、密文下载和本地解密材料接口。
    所有租户接口必须使用 Bearer Token 与 X-Tenant-Id，服务端重新校验租户、用户、公钥和文件授权。
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /tenant/encryption-tasks:
    post:
      summary: 创建多接收者加密任务
      operationId: createMultiRecipientEncryptionTask
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEncryptionTaskRequest'
      responses:
        '201':
          description: 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptionTaskEnvelope'
        '200':
          description: 幂等返回既有任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EncryptionTaskEnvelope'
        default:
          $ref: '#/components/responses/Error'

  /tenant/encryption-tasks/{taskId}/attempts/{attemptId}/complete:
    post:
      summary: 提交一份密文和多份受保护 DEK
      operationId: completeMultiRecipientEncryptionAttempt
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/AttemptId'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteEncryptionRequest'
      responses:
        '200':
          description: 元数据提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCenterDetailEnvelope'
        default:
          $ref: '#/components/responses/Error'

  /tenant/files:
    get:
      summary: 查询文件中心列表
      operationId: listFileCenterItems
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: scope
          in: query
          required: true
          schema:
            type: string
            enum: [tenant_cloud, owned_by_me]
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: 文件中心分页列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCenterListEnvelope'
        default:
          $ref: '#/components/responses/Error'

  /tenant/files/{fileId}:
    get:
      summary: 查询文件详情
      operationId: getFileCenterDetail
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: 当前租户有效成员可查看的密文详情；不返回解密能力判断
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileCenterDetailEnvelope'
        default:
          $ref: '#/components/responses/Error'

  /tenant/files/{fileId}/ciphertext:
    get:
      summary: 下载密文
      operationId: downloadFileCiphertext
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: 密文二进制流；企业云盘可见用户也可下载密文
          headers:
            X-Ciphertext-SHA256:
              schema: { $ref: '#/components/schemas/Sha256Hex' }
            Content-Disposition:
              schema: { type: string }
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        default:
          $ref: '#/components/responses/Error'

  /tenant/files/{fileId}/decryption-material:
    get:
      summary: 获取当前可见文件的全部本地解密材料
      operationId: getOwnDecryptionMaterial
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: 当前租户有效成员可获得全部密钥信封；客户端自行匹配本地私钥
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecryptionMaterialEnvelope'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema: { type: integer, format: uint64, minimum: 1 }
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
    FileId:
      name: fileId
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    Error:
      description: 统一业务错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    Sha256Hex:
      type: string
      pattern: '^[a-f0-9]{64}$'
    EnvelopeBase:
      type: object
      required: [code, message, request_id]
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string }
    ErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { type: 'null' }
    RSARecipientSelection:
      type: object
      additionalProperties: false
      required: [user_id, public_key_id]
      properties:
        user_id: { type: integer, format: uint64, minimum: 1 }
        public_key_id: { type: string, format: uuid }
    CreateEncryptionTaskRequest:
      type: object
      additionalProperties: false
      required: [file, algorithm, authorization]
      properties:
        file:
          type: object
          required: [name, size]
          additionalProperties: false
          properties:
            name: { type: string, minLength: 1, maxLength: 255 }
            size: { type: integer, minimum: 1 }
            display_mime_type: { type: string, maxLength: 255 }
        algorithm:
          type: object
          required: [code, version]
          additionalProperties: false
          properties:
            code: { type: string, example: RSA-OAEP-SHA256 }
            version: { type: string, example: '1' }
        authorization:
          type: object
          required: [type, recipients]
          additionalProperties: false
          properties:
            type: { type: string, const: RSA_RECIPIENTS }
            recipients:
              type: array
              minItems: 1
              maxItems: 100
              items: { $ref: '#/components/schemas/RSARecipientSelection' }
    ProtectedKeySubmission:
      type: object
      additionalProperties: false
      required: [recipient_user_id, rsa_public_key_id, algorithm_code, algorithm_version, format, value_base64, context_sha256, oaep_hash, oaep_label_sha256, protect_duration_ms]
      properties:
        recipient_user_id: { type: integer, format: uint64 }
        rsa_public_key_id: { type: string, format: uuid }
        algorithm_code: { type: string, example: RSA-OAEP-SHA256 }
        algorithm_version: { type: string, example: '1' }
        format: { type: string, example: RSA-OAEP-SHA256-RAW }
        value_base64: { type: string, contentEncoding: base64 }
        context_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        oaep_hash: { type: string, const: SHA-256 }
        oaep_label_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        protect_duration_ms: { type: integer, minimum: 0 }
    CompleteEncryptionRequest:
      type: object
      additionalProperties: false
      required: [upload_id, content_encryption, protected_keys, benchmark]
      properties:
        upload_id: { type: string, format: uuid }
        content_encryption:
          type: object
          required: [algorithm, container_format, encryption_version, nonce_prefix_base64, chunk_size, chunk_count, tag_length, aad_version, context_sha256]
          additionalProperties: false
          properties:
            algorithm: { type: string, const: AES-256-GCM }
            container_format: { type: string, const: GCPABE01 }
            encryption_version: { type: string, const: '1' }
            nonce_prefix_base64: { type: string, contentEncoding: base64 }
            chunk_size: { type: integer, const: 4194304 }
            chunk_count: { type: integer, minimum: 1 }
            tag_length: { type: integer, const: 16 }
            aad_version: { type: string, const: '1' }
            context_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        protected_keys:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ProtectedKeySubmission' }
        benchmark:
          $ref: '#/components/schemas/BenchmarkSubmission'
    BenchmarkSubmission:
      type: object
      required: [validation_duration_ms, file_encryption_duration_ms, key_protection_duration_ms, upload_duration_ms, metadata_commit_duration_ms, total_duration_ms, recipient_count, plaintext_size_bytes, ciphertext_size_bytes, protected_key_total_size_bytes, algorithm_code, algorithm_version, client_runtime, result]
      additionalProperties: false
      properties:
        validation_duration_ms: { type: integer, minimum: 0 }
        file_encryption_duration_ms: { type: integer, minimum: 0 }
        key_protection_duration_ms: { type: integer, minimum: 0 }
        key_protection_avg_ms: { type: integer, minimum: 0 }
        key_protection_min_ms: { type: integer, minimum: 0 }
        key_protection_max_ms: { type: integer, minimum: 0 }
        upload_duration_ms: { type: integer, minimum: 0 }
        metadata_commit_duration_ms: { type: integer, minimum: 0 }
        total_duration_ms: { type: integer, minimum: 0 }
        recipient_count: { type: integer, minimum: 1 }
        plaintext_size_bytes: { type: integer, minimum: 1 }
        ciphertext_size_bytes: { type: integer, minimum: 1 }
        protected_key_total_size_bytes: { type: integer, minimum: 1 }
        algorithm_code: { type: string }
        algorithm_version: { type: string }
        client_runtime: { type: string }
        result: { type: string, enum: [SUCCESS, FAILURE, CANCELLED] }
    UserSummary:
      type: object
      required: [id, display_name, email]
      properties:
        id: { type: integer, format: uint64 }
        display_name: { type: string }
        email: { type: string }
        avatar_url: { type: string }
    FileCenterItem:
      type: object
      required: [id, original_filename, plaintext_size, status, owner, ciphertext_size, created_at]
      properties:
        id: { type: string, format: uuid }
        original_filename: { type: string }
        display_mime_type: { type: string }
        plaintext_size: { type: integer }
        ciphertext_size: { type: integer }
        status: { type: string, enum: [DRAFT, AVAILABLE, FAILED, CANCELLED, CLEANUP_PENDING] }
        owner: { $ref: '#/components/schemas/UserSummary' }
        recipient_summary:
          type: object
          properties:
            count: { type: integer }
            display_names:
              type: array
              items: { type: string }
        performance_summary:
          type: object
          properties:
            local_encryption_duration_ms: { type: integer }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, 'null'], format: date-time }
    FileCenterListEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data:
              type: object
              required: [items, total, page, page_size]
              properties:
                items:
                  type: array
                  items: { $ref: '#/components/schemas/FileCenterItem' }
                total: { type: integer }
                page: { type: integer }
                page_size: { type: integer }
    RecipientDetail:
      type: object
      required: [user, rsa_public_key_id, public_key_version, fingerprint_sha256]
      properties:
        user: { $ref: '#/components/schemas/UserSummary' }
        rsa_public_key_id: { type: string, format: uuid }
        public_key_version: { type: integer }
        fingerprint_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        protect_duration_ms: { type: integer }
    FileCenterDetail:
      type: object
      required: [file, owner, recipients]
      properties:
        file: { $ref: '#/components/schemas/FileCenterItem' }
        owner: { $ref: '#/components/schemas/UserSummary' }
        recipients:
          type: array
          items: { $ref: '#/components/schemas/RecipientDetail' }
        benchmark:
          $ref: '#/components/schemas/BenchmarkSubmission'
        ciphertext:
          type: object
          properties:
            ciphertext_sha256: { $ref: '#/components/schemas/Sha256Hex' }
            ciphertext_size: { type: integer }
            status: { type: string }
            content_algorithm: { type: string, example: AES-256-GCM }
            encryption_version: { type: string, example: '1' }
            nonce_prefix_base64: { type: string }
            authentication_tag_length: { type: integer, example: 16 }
            aad_version: { type: string, example: '1' }
    FileCenterDetailEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/FileCenterDetail' }
    DecryptionMaterial:
      type: object
      required: [file_id, original_filename, plaintext_size, key_envelopes]
      properties:
        file_id: { type: string, format: uuid }
        original_filename: { type: string }
        plaintext_size: { type: integer }
        key_envelopes:
          type: array
          items: { $ref: '#/components/schemas/KeyEnvelope' }
        protected_key_base64: { type: string, contentEncoding: base64, deprecated: true }
        context_sha256: { $ref: '#/components/schemas/Sha256Hex', deprecated: true }
        rsa_public_key_id: { type: string, format: uuid, deprecated: true }
        public_key_fingerprint_sha256: { $ref: '#/components/schemas/Sha256Hex', deprecated: true }
    KeyEnvelope:
      type: object
      required: [key_id, protected_key_base64, context_sha256, algorithm_code, algorithm_version, protected_key_format, rsa_public_key_id, public_key_fingerprint_sha256]
      properties:
        key_id: { type: string, format: uuid }
        protected_key_base64: { type: string, contentEncoding: base64 }
        context_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        algorithm_code: { type: string }
        algorithm_version: { type: string }
        protected_key_format: { type: string }
        rsa_public_key_id: { type: string, format: uuid }
        public_key_fingerprint_sha256: { $ref: '#/components/schemas/Sha256Hex' }
        oaep_hash: { type: string, enum: [SHA-256] }
    DecryptionMaterialEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/DecryptionMaterial' }
