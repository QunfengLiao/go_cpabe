openapi: 3.0.3
info: { title: DU 收到文件与解密材料接口, version: 1.1.0 }
paths:
  /api/v1/tenant/received-files:
    get: { summary: 查询当前租户内兼容收到文件列表，列表不决定本地解密结果 }
  /api/v1/tenant/received-files/{fileId}/decryption-material:
    get: { summary: 获取可见文件的完整密钥信封集合和历史公钥标识 }
  /api/v1/tenant/received-files/{fileId}/ciphertext:
    get: { summary: 流式下载可见文件原始密文包 }
